<script type="application/shiny-prerendered" data-context="server-start">
library(shiny)
library(tidyverse)
library(plotly)

data <- openxlsx::read.xlsx("c:/RProjects/CitUK Age - Survival by route and age.xlsx")

</script>
 
<script type="application/shiny-prerendered" data-context="server">
output$bowelPlot <- renderPlotly({
  p <- plot_ly(data %>%
               filter(Site == "Colorectal", Age != "15 to 54"),
               x = ~Age, 
               y = ~Survival,
               color = ~Route,
               split = ~Length)
  
  if (input$error_bar_bowel) {
    p %>% add_bars(error_y = list(
      type = "data",
      symmetric = FALSE,
      array = ~(UCI - Survival),     
      arrayminus = ~(Survival - LCI),
      color = "#000000"
    ))
  } else {
    p %>% add_bars()
  }
})

</script>
